packages:
  linux:
    preshell:
    brews:
      dev:
        - neovim
        - lazygit
        - zsh
        - zsh-autosuggestions
        - lsd
        - fzf
        - opencode
        - lazydocker
        - k9s
        - ripgrep
        - go-task
        # files explorer
        # Currently removing yazi to try to use super file
        # - yazi
        - ranger
        # Space manager
        - duf
        # And ranger deps
        - highlight
        - bat
        # region vim utils
        - starship
        - htop
        # Development and compilers
        - dotnet
        - go
        - gcc@15
        - z
        # Better git
        - jj
        - jjui
        # File manager (shortcut spf)
        - superfile
      tui:
        # Ollama TUI
        - oterm
        # Time management
        - gping
        - nethogs
        # logs
        - gonzo
        - glances
    casks:
      - flox
      - font-open-iconic

    postshell:
      # Needs to be installed after zsh
      - test -d "${ZSH:-$HOME/.oh-my-zsh}" || sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
      - grep -qxF 'eval "$(starship init zsh)"' ~/.zshrc || echo 'eval "$(starship init zsh)"' >> ~/.zshrc
